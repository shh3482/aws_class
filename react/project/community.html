<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Travel Community</title>
<link rel="stylesheet" href="community.css">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<header class="top-bar">
    <div class="logo">TRAVELLOG</div>
    <div class="auth">
        <a href="#">로그인</a>
        <a href="#">회원가입</a>
    </div>
</header>

<div class="layout">
    <!-- 사이드바 -->
    <aside class="sidebar">
        <h3>카테고리</h3>
        <ul>
            <li class="active">국내여행</li>
            <li>해외여행</li>
            <li>여행추천게시판</li>
            <li>자유게시판</li>
        </ul>
    </aside>

    <!-- 메인 콘텐츠 -->
    <main class="content">
        <h2>국내여행</h2>

				
        <div class="post-grid">
            <!-- 카드 -->
            <div class="post-card">
                <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e" alt="">
                <div class="post-info">
                    <h4>부산 해운대 바다</h4>
                    <p>여름에 진짜 힐링되는 곳이에요. 밤바다 최고…</p>
                    <div class="meta">
                        <span>❤️ 120</span>
                        <span>💬 8</span>
                    </div>
                </div>
            </div>

            <div class="post-card">
                <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee" alt="">
                <div class="post-info">
                    <h4>제주 감성 카페</h4>
                    <p>뷰도 좋고 조용해서 혼자 가기 좋아요.</p>
                    <div class="meta">
                        <span>❤️ 87</span>
                        <span>💬 5</span>
                    </div>
                </div>
            </div>

            <div class="post-card">
                <img src="https://images.unsplash.com/photo-1491553895911-0055eca6402d" alt="">
                <div class="post-info">
                    <h4>강릉 바다 산책</h4>
                    <p>날씨 맑을 때 가면 진짜 예뻐요.</p>
                    <div class="meta">
                        <span>❤️ 64</span>
                        <span>💬 3</span>
                    </div>
                </div>
            </div>

        </div>
    </main>
</div>
<div class="pagination">
    <button>&lt;</button>
    <span class="active">1</span>
    <span>2</span>
    <span>3</span>
    <button>&gt;</button>
</div>


</body>
</html>
