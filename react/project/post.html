<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Post Detail</title>
<link rel="stylesheet" href="community.css">
</head>
<body>

<header class="top-bar">
    <div class="logo">TRAVELLOG</div>
    <div class="auth">
        <a href="#">로그인</a>
        <a href="#">회원가입</a>
    </div>
</header>

<div class="layout">
    <aside class="sidebar">
        <h3>카테고리</h3>
        <ul>
            <li>국내여행</li>
            <li>해외여행</li>
            <li>여행추천게시판</li>
            <li>자유게시판</li>
        </ul>
    </aside>

    <main class="content">
        <div class="post-detail">
            <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e">
            <h2>부산 해운대 바다</h2>
            <p class="author">by steve | 2026.02.10</p>

            <p class="text">
                여름에 진짜 힐링되는 곳이에요. 밤바다 최고…  
                다음엔 꼭 또 가고 싶어요 🌊
            </p>

            <div class="actions">
                <button class="like-btn">❤️ <span>120</span></button>
            </div>
        </div>
    </main>
</div>

<div class="comment-section">
    <h3>댓글</h3>

    <div class="comment-list">
        <div class="comment">
            <strong>user01</strong>
            <p>와 여기 진짜 예쁘네요!</p>
        </div>
        <div class="comment">
            <strong>user02</strong>
            <p>저도 가보고 싶어요 😍</p>
        </div>
    </div>

    <div class="comment-form">
        <textarea placeholder="댓글을 입력하세요"></textarea>
        <button>등록</button>
    </div>
</div>


<script src="community.js"></script>
</body>
</html>
